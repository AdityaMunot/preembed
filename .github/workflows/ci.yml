name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lint tools
        run: python -m pip install ruff mypy
      - name: Ruff check
        run: python -m ruff check python tests
      - name: Ruff format check
        run: python -m ruff format --check python tests
      - name: Mypy
        run: python -m mypy python
        continue-on-error: true

  python-tests:
    name: Python Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - uses: dtolnay/rust-toolchain@stable

      - name: Install and build
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Python tests
        run: python -m pytest -q --tb=short --cov=preembed --cov-report=term-missing

  smoke-test:
    name: Smoke Test (wheel install)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build and install wheel
        run: |
          python -m pip install maturin
          maturin build --release --out dist
          python -m pip install dist/*.whl

      - name: Verify import and quickstart
        run: |
          python -c "
          from preembed import Pipeline, clean_text, chunk_text, dedupe_chunks, score_chunks, __version__
          print(f'preembed {__version__}')

          # Clean
          cleaned = clean_text('<html><script>x</script><p>Hello world</p></html>')
          assert 'Hello world' in cleaned
          assert '<script>' not in cleaned

          # Chunk
          chunks = chunk_text('word ' * 200, chunk_size=50, overlap=5)
          assert len(chunks) > 1

          # Dedupe
          deduped = dedupe_chunks(['a b c'] * 3)
          assert len(deduped) == 1

          # Score
          scored = score_chunks(['This is a test chunk with enough words for scoring.'])
          assert 0.0 <= scored[0].score <= 1.0

          # Pipeline
          result = Pipeline(chunk_size=50, overlap=5).run('word ' * 200)
          assert result.stats.total_chunks > 0

          print('all smoke tests passed')
          "

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        working-directory: rust
        run: cargo test

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Run pip-audit
        run: |
          python -m pip install pip-audit
          pip-audit
        continue-on-error: true
